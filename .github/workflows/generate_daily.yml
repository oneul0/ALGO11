name: Generate daily problem folder

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run generator
        run: python .github/scripts/generate_daily.py

      - name: Commit and push
        run: |
          git config user.name "oneul0"
          git config user.email "neul.dev@gmail.com"
      
          git add .
      
          if git diff --cached --quiet; then
            echo "No staged changes"
            exit 0
          fi
      
          git commit -m "docs: generate daily folder from README"
          git push origin HEAD:${{ github.ref_name }}
